all:
  children:
    lxc:
      hosts:
        dns:
          ansible_host: dns.example.com
        nextcloud:
          ansible_host: nextcloud.example.com
        nginx:
          ansible_host: nginx.example.com
        wireguard:
          ansible_host: wireguard.example.com
      vars:
        ansible_user: ansible
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_python_interpreter: /usr/bin/python3
