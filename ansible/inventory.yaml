all:
  children:
    lxc:
      hosts:
        dns:
          ansible_host: proxmox-dns
        nextcloud:
          ansible_host: proxmox-dysk
        nginx:
          ansible_host: proxmox-nginx
        wireguard:
          ansible_host: proxmox-vpn
      vars:
        ansible_user: szymon
        ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ansible_python_interpreter: /usr/bin/python3
        ansible_ssh_extra_args: '-o IdentityAgent=none'
