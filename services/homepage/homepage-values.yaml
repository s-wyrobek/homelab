widgets:
    - greeting:
        text_size: xl
        text: "Cześć, Szymon 👋"
    - datetime:
        text_size: l
        format:
          timeStyle: short
          dateStyle: long
          hourCycle: h23
    - openmeteo:
        label: Kraków
        latitude: 50.0647
        longitude: 19.9450
        timezone: Europe/Warsaw
        units: metric
        cache: 5
    - resources:
        label: debian-01
        cpu: true
        memory: true
        disk: /
    - search:
        provider: google
        target: _blank
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k3s
        nodes:
          show: false
